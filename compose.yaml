services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: anodizex
      POSTGRES_USER: anodizex
      POSTGRES_PASSWORD: anodizex
    ports:
      - "55435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anodizex -d anodizex"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - afterservice-postgres-data:/var/lib/postgresql/data

volumes:
  afterservice-postgres-data:
